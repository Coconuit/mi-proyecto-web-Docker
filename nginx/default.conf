# ============================================
# Configuración nginx: proxy reverso a la app web
# ============================================
# El proxy escucha en el puerto 80 dentro del contenedor.
# El docker-compose lo mapea al PUBLIC_PORT del host.
# Solo este servicio es accesible desde fuera.
# ============================================

upstream app_web {
    # "web" es el nombre del servicio en docker-compose,
    # Docker DNS lo resuelve a la IP del contenedor.
    server web:3000;
}

server {
    listen 80;
    server_name _;

    # Tamaño máximo de petición (subidas, formularios grandes...)
    client_max_body_size 10m;

    # Logs
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    location / {
        proxy_pass         http://app_web;
        proxy_http_version 1.1;

        # Cabeceras útiles para que la app conozca al cliente real
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Soporte para WebSockets / conexiones long-polling
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts razonables
        proxy_connect_timeout 5s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }
}
